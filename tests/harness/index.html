<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deliberate Local Harness</title>
  </head>
  <body>
    <h1>Local Submit Harness</h1>
    <input-container class="input-gradient">
      <input-area-v2 class="ui-improvements-phase-1">
        <div class="input-area">
          <button class="send-button" aria-label="Send message">
            <mat-icon fonticon="send"></mat-icon>
          </button>
          <div class="text-input-field">
            <div class="text-input-field_textarea-wrapper">
              <div class="text-input-field-main-area">
                <div class="text-input-field_textarea-inner">
                  <rich-textarea class="text-input-field_textarea">
                    <div class="ql-editor textarea new-input-ui" contenteditable="true" role="textbox" aria-label="Enter a prompt for Gemini">draft prompt</div>
                  </rich-textarea>
                </div>
              </div>
            </div>
          </div>
        </div>
      </input-area-v2>
    </input-container>
    <p id="native-send-state">idle</p>
    <script>
      const state = document.getElementById('native-send-state');
      const composer = document.querySelector('[role="textbox"][aria-label="Enter a prompt for Gemini"]');
      const send = document.querySelector('button.send-button');

      const markSent = () => {
        state.textContent = 'sent';
      };

      composer.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          if (event.defaultPrevented) return;
          markSent();
        }
      });

      send.addEventListener('click', (event) => {
        if (event.defaultPrevented) return;
        markSent();
      });
    </script>
  </body>
</html>
